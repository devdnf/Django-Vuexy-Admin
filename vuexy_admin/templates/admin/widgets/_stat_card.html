{% load i18n %}
<!--
  _stat_card.html — KPI tile with icon badge, value, trend indicator.
  Variables: title, value, icon, color, trend, trend_up, subtitle
-->
<div class="card h-100">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">

      <!-- Text block -->
      <div>
        <p class="mb-1 text-body">{{ title }}</p>
        <h4 class="mb-1">{{ value }}</h4>
        {% if trend %}
          {% if trend_up or trend_up == None %}
            <small class="text-success fw-medium">
              <i class="ti ti-trending-up me-1"></i>{{ trend }}
            </small>
          {% else %}
            <small class="text-danger fw-medium">
              <i class="ti ti-trending-down me-1"></i>{{ trend }}
            </small>
          {% endif %}
        {% endif %}
        {% if subtitle %}
          <p class="mt-1 mb-0 text-muted" style="font-size:.75rem">{{ subtitle }}</p>
        {% endif %}
      </div>

      <!-- Icon badge -->
      <div class="badge rounded p-2 bg-label-{{ color|default:'primary' }}">
        <i class="ti {{ icon|default:'ti-chart-bar' }} ti-28px"></i>
      </div>

    </div>
  </div>
</div>
