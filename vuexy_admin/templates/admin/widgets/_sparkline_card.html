{% load i18n %}
<!--
  _sparkline_card.html — stat card with tiny bar/line/area sparkline.
  Requires ApexCharts (_apex_scripts.html) loaded once on the page.
  Variables: chart_id, title, value, chart_data, subtitle, trend,
             trend_up, chart_type, color, chart_height
-->
<div class="card h-100">
  <div class="card-header pb-0">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <h5 class="mb-1 card-title">{{ title }}</h5>
        {% if subtitle %}<p class="card-subtitle mb-0">{{ subtitle }}</p>{% endif %}
      </div>
      {% if trend %}
        {% if trend_up or trend_up == None %}
          <span class="badge bg-label-success">
            <i class="ti ti-trending-up me-1"></i>{{ trend }}
          </span>
        {% else %}
          <span class="badge bg-label-danger">
            <i class="ti ti-trending-down me-1"></i>{{ trend }}
          </span>
        {% endif %}
      {% endif %}
    </div>
    <h4 class="mb-0 mt-2">{{ value }}</h4>
  </div>

  <div class="card-body px-0 pb-0">
    <div id="{{ chart_id }}"></div>
  </div>
</div>

<script>
(function () {
  'use strict';
  var el = document.getElementById('{{ chart_id }}');
  if (!el || typeof ApexCharts === 'undefined') return;

  var isDark      = document.documentElement.classList.contains('dark-style');
  var cfg         = window.config || {};
  var barBg       = isDark ? '#3d4157' : '#efeef0';
  var primaryColor = '{{ color|default:"" }}' || (cfg.colors && cfg.colors.primary) || '#7367f0';
  var chartType   = '{{ chart_type|default:"bar" }}';
  var chartHeight = {{ chart_height|default:80 }};

  var options = {
    chart: {
      type:              chartType,
      height:            chartHeight,
      parentHeightOffset: 0,
      toolbar:           { show: false },
      sparkline:         { enabled: true }
    },
    series: [{ data: {{ chart_data|safe }} }],
    colors: [primaryColor],
    grid: {
      show:    false,
      padding: { top: 0, bottom: 0, left: 10, right: 10 }
    },
    dataLabels: { enabled: false },
    tooltip:    { enabled: false },
    xaxis: {
      labels:      { show: false },
      axisBorder:  { show: false },
      axisTicks:   { show: false }
    },
    yaxis: { labels: { show: false } }
  };

  if (chartType === 'bar') {
    options.plotOptions = {
      bar: {
        columnWidth:    '60%',
        borderRadius:   4,
        startingShape:  'rounded',
        endingShape:    'rounded',
        colors: {
          backgroundBarColors: [barBg, barBg, barBg, barBg, barBg, barBg, barBg],
          backgroundBarRadius: 4
        }
      }
    };
  } else if (chartType === 'line' || chartType === 'area') {
    options.stroke  = { width: 2, curve: 'smooth' };
    options.fill    = chartType === 'area' ? { type: 'gradient', gradient: { shadeIntensity: 0.8, opacityFrom: 0.3, opacityTo: 0.05 } } : {};
    options.markers = { size: 0 };
  }

  new ApexCharts(el, options).render();
})();
</script>
